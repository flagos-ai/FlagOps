name: 'Post Benchmark Report'
description: 'Upload a benchmark test metric file to a backend HTTP service'

inputs:
  backend_url:
    description: 'Full URL of the backend metrics endpoint'
    required: true
  results_file:
    description: 'Path to the benchmark test metric file'
    required: true
  api_token:
    description: 'Bearer token for authentication (optional)'
    required: false
    default: ''
  file_format:
    description: 'File format identifier'
    required: false
    default: 'json'
  file_type:
    description: 'File type identifier'
    required: false
    default: 'benchmark'
  is_zipped:
    description: 'Whether the file is zipped'
    required: false
    default: 'false'
  git_project_name:
    description: 'Project name (defaults to github.repository)'
    required: false
    default: ''
  workflow_name:
    description: 'Workflow name (defaults to github.workflow)'
    required: false
    default: ''
  job_name:
    description: 'Job name (defaults to github.job)'
    required: false
    default: ''
  pr_id:
    description: 'Pull request number (auto-detected from PR events if not set)'
    required: false
    default: ''
  fail_on_error:
    description: 'Whether to fail the step on upload error'
    required: false
    default: 'true'

outputs:
  status:
    description: 'HTTP status code from the upload request'
    value: ${{ steps.upload.outputs.status }}

runs:
  using: 'composite'
  steps:
    - name: Resolve inputs and validate
      id: resolve
      shell: bash
      run: |
        # Resolve git_project_name
        PROJECT_NAME="${{ inputs.git_project_name }}"
        if [ -z "$PROJECT_NAME" ]; then
          PROJECT_NAME="${{ github.repository }}"
        fi
        echo "project_name=$PROJECT_NAME" >> "$GITHUB_OUTPUT"

        # Resolve workflow_name
        WORKFLOW_NAME="${{ inputs.workflow_name }}"
        if [ -z "$WORKFLOW_NAME" ]; then
          WORKFLOW_NAME="${{ github.workflow }}"
        fi
        echo "workflow_name=$WORKFLOW_NAME" >> "$GITHUB_OUTPUT"

        # Resolve job_name
        JOB_NAME="${{ inputs.job_name }}"
        if [ -z "$JOB_NAME" ]; then
          JOB_NAME="${{ github.job }}"
        fi
        echo "job_name=$JOB_NAME" >> "$GITHUB_OUTPUT"

        # Resolve pr_id
        PR_ID="${{ inputs.pr_id }}"
        if [ -z "$PR_ID" ]; then
          PR_ID="${{ github.event.pull_request.number }}"
        fi
        echo "pr_id=$PR_ID" >> "$GITHUB_OUTPUT"

        # Validate results file exists
        if [ ! -f "${{ inputs.results_file }}" ]; then
          echo "::error::Results file not found: ${{ inputs.results_file }}"
          if [ "${{ inputs.fail_on_error }}" = "true" ]; then
            exit 1
          else
            echo "::warning::Results file not found, skipping upload."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
        fi

        echo "skip=false" >> "$GITHUB_OUTPUT"

    - name: Upload report
      id: upload
      if: steps.resolve.outputs.skip != 'true'
      shell: bash
      run: |
        # Determine upload file path
        RESULTS_FILE="${{ inputs.results_file }}"
        IS_ZIPPED="${{ inputs.is_zipped }}"
        UPLOAD_FILE="$RESULTS_FILE"

        if [ "$IS_ZIPPED" != "true" ]; then
          # Compress the file into a tar.gz archive
          ARCHIVE_PATH="/tmp/benchmark_results_$(date +%Y%m%d_%H%M%S).tar.gz"
          tar -czf "$ARCHIVE_PATH" -C "$(dirname "$RESULTS_FILE")" "$(basename "$RESULTS_FILE")"
          UPLOAD_FILE="$ARCHIVE_PATH"
          IS_ZIPPED="true"
          echo "Archive created: $ARCHIVE_PATH ($(du -h "$ARCHIVE_PATH" | cut -f1))"
        fi

        # Build curl command
        CURL_ARGS=(
          -s
          -X POST
          -w '%{http_code}'
          -o /tmp/upload_response.txt
          -F "file_format=${{ inputs.file_format }}"
          -F "file_type=${{ inputs.file_type }}"
          -F "is_zipped=$IS_ZIPPED"
          -F "git_project_name=${{ steps.resolve.outputs.project_name }}"
          -F "workflow_name=${{ steps.resolve.outputs.workflow_name }}"
          -F "job_name=${{ steps.resolve.outputs.job_name }}"
        )

        # Conditionally add pr_id
        PR_ID="${{ steps.resolve.outputs.pr_id }}"
        if [ -n "$PR_ID" ]; then
          CURL_ARGS+=(-F "pr_id=$PR_ID")
        fi

        # Add the file
        CURL_ARGS+=(-F "file=@${UPLOAD_FILE}")

        # Conditionally add auth header
        TOKEN="${{ inputs.api_token }}"
        if [ -n "$TOKEN" ]; then
          CURL_ARGS+=(-H "Authorization: Bearer $TOKEN")
        fi

        # Execute
        HTTP_STATUS=$(curl "${CURL_ARGS[@]}" "${{ inputs.backend_url }}")

        echo "status=$HTTP_STATUS" >> "$GITHUB_OUTPUT"
        echo "HTTP status: $HTTP_STATUS"

        # Check response
        if [[ "$HTTP_STATUS" -lt 200 || "$HTTP_STATUS" -ge 300 ]]; then
          echo "::error::Upload failed with HTTP status $HTTP_STATUS"
          echo "Response body:"
          cat /tmp/upload_response.txt
          if [ "${{ inputs.fail_on_error }}" = "true" ]; then
            exit 1
          else
            echo "::warning::Upload failed (HTTP $HTTP_STATUS), but fail_on_error is false."
          fi
        else
          echo "Upload successful (HTTP $HTTP_STATUS)"
        fi
